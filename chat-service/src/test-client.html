<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Relay — Chat</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
  :root {
    --ink: #1b1f23;
    --paper: #f6f5f1;
    --panel: #ffffff;
    --line: #e4e1d8;
    --accent: #3d5a80;
    --accent-soft: #e8edf3;
    --bubble-me: #3d5a80;
    --bubble-me-text: #ffffff;
    --bubble-them: #ffffff;
    --bubble-them-text: #1b1f23;
    --muted: #8a8578;
    --success: #4c8c5c;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ---------- Connect Screen ---------- */
  #connectScreen {
    width: 380px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 36px 32px;
    box-shadow: 0 20px 50px rgba(27,31,35,0.08);
  }

  #connectScreen h1 {
    font-size: 22px;
    margin: 0 0 4px;
    letter-spacing: -0.02em;
  }

  #connectScreen p.sub {
    margin: 0 0 24px;
    color: var(--muted);
    font-size: 13px;
  }

  .field-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 6px;
    display: block;
  }

  textarea#tokenInput {
    width: 100%;
    height: 90px;
    resize: none;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
    font-family: ui-monospace, monospace;
    margin-bottom: 8px;
  }

  input#serverUrl {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 13px;
    margin-bottom: 18px;
  }

  button.primary {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  button.primary:hover { opacity: 0.92; }

  #connectStatus {
    margin-top: 14px;
    font-size: 12.5px;
    text-align: center;
    color: var(--muted);
    min-height: 16px;
  }

  #connectStatus.error { color: #b5484d; }
  #connectStatus.ok { color: var(--success); }

  /* ---------- Chat App ---------- */
  #app {
    display: none;
    width: 900px;
    height: 620px;
    background: var(--panel);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(27,31,35,0.1);
    border: 1px solid var(--line);
  }

  #app.active { display: flex; }

  /* --- Sidebar --- */
  #sidebar {
    width: 300px;
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    background: #fbfaf7;
  }

  #meBar {
    padding: 18px 20px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    position: relative;
  }

  .status-dot {
    position: absolute;
    bottom: -1px;
    right: -1px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #b8b3a3;
    border: 2px solid var(--panel);
  }

  .status-dot.online { background: var(--success); }

  #meBar .name {
    font-size: 13px;
    font-weight: 600;
  }

  #meBar .status {
    font-size: 11px;
    color: var(--success);
  }

  .contact .status-line {
    font-size: 11px;
    color: var(--muted);
  }

  .contact .status-line.online { color: var(--success); }

  #addContact {
    padding: 14px 16px;
    border-bottom: 1px solid var(--line);
  }

  #addContact input {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 12px;
    margin-bottom: 6px;
  }

  #addContact button {
    width: 100%;
    background: var(--accent-soft);
    color: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }

  #contactList {
    flex: 1;
    overflow-y: auto;
  }

  .contact {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    border-bottom: 1px solid #f0efe9;
  }

  .contact:hover { background: var(--accent-soft); }
  .contact.selected { background: var(--accent-soft); }

  .contact .meta { min-width: 0; }

  .contact .id {
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .contact .preview {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 190px;
  }

  #emptyContacts {
    padding: 30px 20px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
  }

  /* --- Conversation --- */
  #conversation {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  #convHeader {
    padding: 16px 22px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #convHeader .id {
    font-size: 13px;
    font-weight: 600;
  }

  #convHeader .typing-indicator {
    font-size: 11px;
    color: var(--accent);
    font-style: italic;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  #noSelection {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 13px;
    text-align: center;
    padding: 40px;
    line-height: 1.6;
  }

  .bubble-row {
    display: flex;
  }

  .bubble-row.me { justify-content: flex-end; }
  .bubble-row.them { justify-content: flex-start; }

  .bubble {
    max-width: 62%;
    padding: 9px 13px;
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.4;
  }

  .bubble-row.me .bubble {
    background: var(--bubble-me);
    color: var(--bubble-me-text);
    border-bottom-right-radius: 4px;
  }

  .bubble-row.them .bubble {
    background: var(--bubble-them);
    color: var(--bubble-them-text);
    border: 1px solid var(--line);
    border-bottom-left-radius: 4px;
  }

  .bubble .time {
    font-size: 10px;
    opacity: 0.65;
    margin-top: 3px;
    display: block;
  }

  #composer {
    border-top: 1px solid var(--line);
    padding: 14px 18px;
    display: flex;
    gap: 10px;
  }

  #composer input {
    flex: 1;
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 10px 16px;
    font-size: 13px;
  }

  #composer button {
    background: var(--accent);
    color: white;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 15px;
  }

  #composer button:disabled {
    background: var(--line);
    cursor: not-allowed;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
</style>
</head>
<body>

<!-- ===== Connect Screen ===== -->
<div id="connectScreen">
  <h1>Relay</h1>
  <p class="sub">Paste the JWT you got from /verify-otp to connect.</p>

  <label class="field-label">Server URL</label>
  <input id="serverUrl" value="http://localhost:6001" />

  <label class="field-label">Access Token</label>
  <textarea id="tokenInput" placeholder="eyJhbGciOi..."></textarea>

  <button class="primary" onclick="connectSocket()">Connect</button>
  <div id="connectStatus"></div>
</div>

<!-- ===== Chat App ===== -->
<div id="app">
  <div id="sidebar">
    <div id="meBar">
      <div class="avatar" id="meAvatar">?</div>
      <div>
        <div class="name" id="meId">—</div>
        <div class="status">● online</div>
      </div>
    </div>

    <div id="addContact">
      <input id="newContactId" placeholder="Their user _id" />
      <input id="newContactName" placeholder="Their name (until they message you)" style="margin-top:6px" />
      <button onclick="addContact()">Start conversation</button>
    </div>

    <div id="contactList">
      <div id="emptyContacts">No conversations yet. Add a contact's user ID above to start chatting.</div>
    </div>
  </div>

  <div id="conversation">
    <div id="noSelection">Select a conversation on the left,<br/>or start a new one.</div>
  </div>
</div>

<script>
  let socket = null;
  let myId = null;
  let myName = null;
  let activeContact = null;
  const contacts = {};       // id -> { messages: [], name }
  const onlineIds = new Set();
  let typingTimeout = null;

  function connectSocket() {
    const url = document.getElementById("serverUrl").value.trim();
    const token = document.getElementById("tokenInput").value.trim();
    const status = document.getElementById("connectStatus");

    if (!token) {
      status.textContent = "Please paste a token first.";
      status.className = "error";
      return;
    }

    status.textContent = "Connecting...";
    status.className = "";

    socket = io(url, { auth: { token } });

    socket.on("connect", () => {
      status.textContent = "Connected.";
      status.className = "ok";
      const claims = parseJwt(token);
      myId = (claims && claims.id) || socket.id;
      myName = (claims && claims.name) || "Me";
      document.getElementById("meId").textContent = myName;
      document.getElementById("meAvatar").textContent = myName.slice(0, 2).toUpperCase();
      document.getElementById("connectScreen").style.display = "none";
      document.getElementById("app").classList.add("active");
    });

    socket.on("connect_error", (err) => {
      status.textContent = "Connection failed: " + err.message;
      status.className = "error";
    });

    socket.on("receive_message", (msg) => {
      const otherId = msg.sender === myId ? msg.receiver : msg.sender;
      ensureContact(otherId, msg.senderName); //
      contacts[otherId].messages.push(msg);
      renderContactList();
      if (activeContact === otherId) renderMessages();
    });

    socket.on("message_sent", (msg) => {
      ensureContact(msg.receiver);
      contacts[msg.receiver].messages.push(msg);
      renderContactList();
      if (activeContact === msg.receiver) renderMessages();
    });

    socket.on("user_typing", ({ senderId }) => {
      if (activeContact === senderId) {
        const el = document.getElementById("typingIndicator");
        if (el) {
          el.textContent = "typing...";
          clearTimeout(typingTimeout);
          typingTimeout = setTimeout(() => {
            el.textContent = onlineIds.has(senderId) ? "online" : "offline";
          }, 1500);
        }
      }
    });

    socket.on("error_message", (msg) => alert("Chat error: " + msg));

    // Full snapshot of who's online, sent once right after connecting.
    socket.on("online_users", (ids) => {
      ids.forEach((id) => onlineIds.add(id));
      renderContactList();
      updateHeaderStatus();
    });

    // Live updates as people connect/disconnect.
    socket.on("user_status", ({ userId, online }) => {
      if (online) onlineIds.add(userId);
      else onlineIds.delete(userId);
      renderContactList();
      updateHeaderStatus();
    });
  }

  function parseJwt(token) {
    try {
      return JSON.parse(atob(token.split(".")[1]));
    } catch (e) {
      return null;
    }
  }

  // name is optional: if we already know it (e.g. from a received message), keep it;
  // otherwise fall back to whatever label was provided, or the id itself.
  function ensureContact(id, name) {
    if (!contacts[id]) {
      contacts[id] = { messages: [], name: name || id };
    } else if (name) {
      contacts[id].name = name; // real name from a message always wins over a manual label
    }
  }

  function addContact() {
    const id = document.getElementById("newContactId").value.trim();
    const name = document.getElementById("newContactName").value.trim();
    if (!id) return;
    ensureContact(id, name);
    document.getElementById("newContactId").value = "";
    document.getElementById("newContactName").value = "";
    socket.emit("check_status", id); // 👈 find out immediately if they're online
    renderContactList();
    selectContact(id);
  }

  function renderContactList() {
    const list = document.getElementById("contactList");
    const ids = Object.keys(contacts);

    if (ids.length === 0) {
      list.innerHTML = '<div id="emptyContacts">No conversations yet. Add a contact\'s user ID above to start chatting.</div>';
      return;
    }

    list.innerHTML = "";
    ids.forEach((id) => {
      const msgs = contacts[id].messages;
      const last = msgs[msgs.length - 1];
      const name = contacts[id].name || id;
      const online = onlineIds.has(id);
      const div = document.createElement("div");
      div.className = "contact" + (id === activeContact ? " selected" : "");
      div.onclick = () => selectContact(id);
      div.innerHTML = `
        <div class="avatar">${name.slice(0, 2).toUpperCase()}<span class="status-dot ${online ? "online" : ""}"></span></div>
        <div class="meta">
          <div class="id">${escapeHtml(name)}</div>
          <div class="preview">${last ? escapeHtml(last.content) : (online ? "Online" : "Offline")}</div>
        </div>
      `;
      list.appendChild(div);
    });
  }

  function updateHeaderStatus() {
    if (!activeContact) return;
    const dot = document.querySelector("#convHeader .status-dot");
    const label = document.getElementById("typingIndicator");
    const online = onlineIds.has(activeContact);
    if (dot) dot.className = "status-dot" + (online ? " online" : "");
    if (label && label.textContent !== "typing...") {
      label.textContent = online ? "online" : "offline";
    }
  }

  function selectContact(id) {
    activeContact = id;
    renderContactList();
    renderConversation();
  }

  function renderConversation() {
    const conv = document.getElementById("conversation");
    const name = contacts[activeContact]?.name || activeContact;
    const online = onlineIds.has(activeContact);
    conv.innerHTML = `
      <div id="convHeader">
        <div class="avatar">${name.slice(0, 2).toUpperCase()}<span class="status-dot ${online ? "online" : ""}"></span></div>
        <div>
          <div class="id">${escapeHtml(name)}</div>
          <div class="typing-indicator" id="typingIndicator">${online ? "online" : "offline"}</div>
        </div>
      </div>
      <div id="messages"></div>
      <div id="composer">
        <input id="messageInput" placeholder="Type a message" onkeydown="handleKey(event)" oninput="notifyTyping()" />
        <button onclick="sendMessage()">➤</button>
      </div>
    `;
    renderMessages();
  }

  function renderMessages() {
    const box = document.getElementById("messages");
    if (!box) return;
    const msgs = contacts[activeContact]?.messages || [];
    box.innerHTML = "";
    msgs.forEach((m) => {
      const mine = m.sender === myId;
      const row = document.createElement("div");
      row.className = "bubble-row " + (mine ? "me" : "them");
      const time = m.createdAt ? new Date(m.createdAt).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) : "";
      row.innerHTML = `<div class="bubble">${escapeHtml(m.content)}<span class="time">${time}</span></div>`;
      box.appendChild(row);
    });
    box.scrollTop = box.scrollHeight;
  }

  function sendMessage() {
    const input = document.getElementById("messageInput");
    const content = input.value.trim();
    if (!content || !activeContact) return;
    socket.emit("send_message", { receiverId: activeContact, content });
    input.value = "";
  }

  function handleKey(e) {
    if (e.key === "Enter") sendMessage();
  }

  function notifyTyping() {
    if (activeContact) socket.emit("typing", { receiverId: activeContact });
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }
</script>
</body>
</html>
